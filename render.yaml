services:
  - type: web
    name: civicsignal-api
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    dockerCommand: /bin/sh -c "alembic upgrade head && uvicorn civicsignal_api.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips='*'"
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: strict
      - key: SESSION_ABSOLUTE_SECONDS
        value: "28800"
      - key: SESSION_IDLE_SECONDS
        value: "1800"
      - key: DEMO_MODE
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PROXY_SHARED_SECRET
        sync: false
      - key: MAINTENANCE_TOKEN
        sync: false
