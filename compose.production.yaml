services:
  db:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  api:
    build: ./apps/api
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:?required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?required}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:?required}
      API_PUBLIC_URL: ${API_PUBLIC_URL:?required}
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:?required}
      MAINTENANCE_TOKEN: ${MAINTENANCE_TOKEN:?required}
      DEMO_MODE: "false"
      COOKIE_SECURE: "true"
      SESSION_ABSOLUTE_SECONDS: ${SESSION_ABSOLUTE_SECONDS:-28800}
      SESSION_IDLE_SECONDS: ${SESSION_IDLE_SECONDS:-1800}
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  web:
    build: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:?required}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-staging}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?required}
      NEXT_PUBLIC_EMERGENCY_MESSAGE: ${EMERGENCY_MESSAGE:?required}
      NEXT_PUBLIC_DATA_MODE: ${NEXT_PUBLIC_DATA_MODE:-demo}
    ports: ["127.0.0.1:${WEB_PORT:-3000}:3000"]
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?required}
volumes:
  postgres_data:
