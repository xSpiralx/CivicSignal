services:
  db:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civicsignal}
      POSTGRES_USER: ${POSTGRES_USER:-civicsignal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://civicsignal:local-development-only@db:5432/civicsignal}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,api}
    command: sh -c "alembic upgrade head && uvicorn civicsignal_api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/alembic:/app/alembic
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      target: dependencies
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      NEXT_PUBLIC_EMERGENCY_MESSAGE: ${NEXT_PUBLIC_EMERGENCY_MESSAGE:-Call 911 for immediate danger.}
      NEXT_PUBLIC_REPOSITORY_URL: ${NEXT_PUBLIC_REPOSITORY_URL:-https://github.com/xSpiralx/CivicSignal}
    command: npm run dev
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  web_node_modules:
