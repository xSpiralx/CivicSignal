name: Security
on:
  push: { branches: [main] }
  pull_request:
  schedule: [{ cron: "17 7 * * 1" }]
permissions:
  contents: read
jobs:
  dependency-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pip-audit==2.9.0
      - run: pip-audit --strict apps/api
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci && npm audit --audit-level=high
        working-directory: apps/web
  codeql:
    permissions: { security-events: write, packages: read, contents: read }
    runs-on: ubuntu-latest
    strategy: { matrix: { language: [python, javascript-typescript] } }
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with: { languages: "${{ matrix.language }}" }
      - uses: github/codeql-action/analyze@v4
