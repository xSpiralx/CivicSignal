name: Bug report
description: Report reproducible CivicSignal behavior
body:
  - type: textarea
    id: description
    attributes: { label: What happened?, description: Do not include secrets or personal crisis information. }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: Reproduction steps }
    validations: { required: true }
  - type: textarea
    id: environment
    attributes: { label: Environment and version }
    validations: { required: true }
